## 6  Severity Guidance

| Severity | Meaning | Examples |
|---|---|---|
| 🔴 **Blocker** | Must fix before merge | Pre-commit hook failure, missing type annotations, returning raw dict instead of Pydantic model, broken API contract |
| 🟡 **Warning** | Should fix, not a merge blocker | Missing docstring, overly broad exception catch, function > 60 lines |
| 🔵 **Suggestion** | Nice-to-have improvement | Naming refinement, extracting a helper, adding an inline comment |

---

## 7  Review Tone

- Be **constructive and specific** — always explain *why* something is an issue and suggest a fix.
- Reference the relevant rule (e.g. "per §3.1, return a Pydantic model instead of a raw dict").
- Acknowledge good patterns when you see them.

---

## 8  Out of Scope for Copilot Review

Do **not** flag the following (they are known / intentional):
- `E501` line-length violations — explicitly suppressed in ruff config.
- `D100`, `D101`, `D104`, `D107` missing docstrings — suppressed for modules, classes, packages, and `__init__`.
- `ignore_missing_imports = true` in mypy config — third-party stubs are incomplete.
- `S101` use of `assert` — suppressed (used freely in tests and assertions).
