name: Create package documentation

on:
  # push:
  #   branches:
  #     # - main
  #     - docs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install uv --no-cache
          uv sync --group dev
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        
      # - name: Install Pandoc
      #   run: |
      #     # sudo apt-get update
      #     sudo apt-get install -y pandoc          # needed for interlinking notebooks
      - name: Copy notebooks for docs
        run: |
          mkdir -p docs/source/notebooks
          cp src/notebooks/*.ipynb docs/source/notebooks/
      - name: Sphinx build
        run: |
          rm -rf docs/build/html             # Clean up old HTML build completely
          uv run sphinx-build docs/source docs/build/html
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        # if: ${{ github.event_name == 'push' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html/
          force_orphan: true