repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: ruff-lint
        name: Ruff Lint (fix)
        entry: uv run ruff check --fix --show-fixes
        language: system
        types: [python]

      - id: mypy
        name: Mypy (incremental)
        entry: uv run mypy
        language: system
        types: [python]
        stages: [manual]

      - id: mypy-full
        name: Mypy (full project)
        entry: uv run mypy src/bayesprop
        language: system
        pass_filenames: false
        stages: [manual]
